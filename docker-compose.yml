# Profiles: dev (WordPress stack + mirror-ai-dev), prod (mirror-ai only).
#   Dev, AI only:   docker compose --profile dev up -d mirror-ai-dev
#   Dev, full stack: docker compose --profile dev up -d
#   Prod (AI only): docker compose --profile prod up -d
#   Prod includes Caddy (HTTPS) for Typesense on TYPESENSE_SEARCH_HOST; set it in .env / .env.prod.
#   Typesense API is bound to 127.0.0.1:8108 on the host so browsers use HTTPS via Caddy, not raw 8108 from the internet.
services:

  tailscale:
    profiles: [dev]
    # v1.78.1 panics on Docker when TS_SERVE_CONFIG is set (nil kubeClient); fixed in v1.78.3. See tailscale/tailscale#14354.
    image: ghcr.io/tailscale/tailscale:v1.78.3
    hostname: ${TAILSCALE_MAGICDNS_HOSTNAME}
    extra_hosts:
      - "api.wordpress.org:198.143.164.251"
      - "downloads.wordpress.org:198.143.164.250"
    ports:
      - "${WEB_PORT}:80"
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      # Default is userspace networking; Serve → 127.0.0.1:80 is more reliable with kernel tun (we already mount /dev/net/tun).
      TS_USERSPACE: "false"
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:-}
    volumes:
      - tailscale_state:/var/lib/tailscale
      - ./tailscale/serve:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped
  db:
    profiles: [dev]
    image: mysql:8.4
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

  wordpress:
    profiles: [dev]
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
      - db
    user: 1000:1000
    image: fr-mirror:latest
    env_file:
      - .env
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DEBUG: "1" # A non-empty value enables WP_DEBUG in wp-config.php
    volumes:
      - type: bind
        source: "./WordPress/wp-content/"
        target: "/var/www/html/wp-content/"
      - type: bind
        source: "./wordpress.ini"
        target: "/usr/local/etc/php/conf.d/wordpress.ini"
      - type: bind
        source: "./wp-config.php"
        target: "/var/www/html/wp-config.php"

  my-wpcli:
    image: wordpress:cli
    # Dev only (depends on wordpress). Use: `docker compose --profile dev run --rm my-wpcli wp …`
    profiles: [dev]
    # Match wordpress:cli defaults so wp can read core + write plugins (uid 1000 often breaks wp core is-installed / installs on bind-mounted wp-content).
    extra_hosts:
      # Same static hosts as tailscale service so wp plugin install can reach wordpress.org if DNS is flaky.
      - "api.wordpress.org:198.143.164.251"
      - "downloads.wordpress.org:198.143.164.250"
    depends_on:
      - wordpress
      - db
    volumes_from:
      - wordpress
    links:
      - db:mysql
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - type: bind
        source: "./scripts/wpcli-entrypoint.sh"
        target: "/bin/wpcli-entrypoint.sh"
        read_only: true
      - type: bind
        source: "./scripts/wp-plugins.txt"
        target: "/bin/wp-plugins.txt"
        read_only: true
    entrypoint: ["/bin/sh", "/bin/wpcli-entrypoint.sh"]
    tty: true

  phpmyadmin:
    profiles: [dev]
    image: phpmyadmin/phpmyadmin
    networks:
      - fr-mirror-bridge
    ports:
      - "${PHP_MYADMIN_PORT}:80"  # You can change the first number (8080) to any port you prefer for accessing phpMyAdmin
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db

  fr-mirror-ai:
    profiles: [dev, prod]
    depends_on:
      - typesense
    build:
      context: .
      dockerfile: Dockerfile.ai
    image: fr-mirror-ai
    user: 1000:1000
    restart: unless-stopped
    networks:
      - fr-mirror-bridge
    ports:
      - "${API_PORT}:80"  # FastAPI application
      - "8086:8080"  # OAuth redirect callback port
    volumes:
      - .:/code
      - ~/.ssh:/home/app/.ssh:ro
    environment:
      - DATABASE_URL
      - YOUTUBE_COOKIES_PATH
    env_file:
      - .env
      - .env.prod
    command: >
      sh -c "
        git config --global user.email ${GIT_USER_EMAIL} &&
        git config --global user.name ${GIT_USER_NAME} && 
        uvicorn app.main:app --host 0.0.0.0 --port 80 --reload
      "
  typesense:
    profiles: [dev, prod]
    image: typesense/typesense:30.2
    restart: always
    environment:
      - TYPESENSE_DATA_DIR=/data
    networks:
      - fr-mirror-bridge
    ports:
      # Host port defaults to 8108 if TYPESENSE_HOST_PORT is unset or empty.
      # Loopback only: other containers still reach typesense:8108 on fr-mirror-bridge; use Caddy (prod) for WAN HTTPS.
      - "${TYPESENSE_HOST_PORT:-8108}:8108"
    volumes:
      - ./typesense-data:/data
    command:
      - "--data-dir"
      - "/data"
      - "--api-key"
      - "${TYPESENSE_API_KEY}"
      - "--enable-cors"

  caddy:
    profiles: [dev,prod]
    image: caddy:2-alpine
    container_name: fr-mirror-caddy
    restart: unless-stopped
    depends_on:
      - typesense
    networks:
      - fr-mirror-bridge
    ports:
      - "${CADDY_HTTP_PORT}:80"
      - "${CADDY_HTTPS_PORT}:443"
    env_file:
      - .env
      - .env.prod
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data: {}
  tailscale_state: {}
  caddy_data: {}
  caddy_config: {}

networks:
  fr-mirror-bridge:
    driver: bridge