# Profiles: dev (WordPress stack + mirror-ai-dev), prod (mirror-ai only).
#   Dev, AI only:   docker compose --profile dev up -d mirror-ai-dev
#   Dev, full stack: docker compose --profile dev up -d
#   Prod (AI only): docker compose --profile prod up -d
services:
  db:
    profiles: [dev]
    image: mysql:8.4
    networks:
      - fr-mirror-bridge
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

  wordpress:
    profiles: [dev]
    depends_on:
      - db
    user: 1000:1000
    image: fr-mirror:latest
    networks:
      - fr-mirror-bridge
    ports:
      - "${WEB_PORT}:80"
    extra_hosts:
      - "api.wordpress.org:198.143.164.251"
      - "downloads.wordpress.org:198.143.164.250"
    env_file:
      - .env
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DEBUG: "1" # A non-empty value enables WP_DEBUG in wp-config.php
    volumes:
      - type: bind
        source: "./WordPress/wp-content/"
        target: "/var/www/html/wp-content/"
      - type: bind
        source: "./wordpress.ini"
        target: "/usr/local/etc/php/conf.d/wordpress.ini"
      - type: bind
        source: "./wp-config.php"
        target: "/var/www/html/wp-config.php"

  my-wpcli:
    profiles: [dev]
    image: wordpress:cli
    networks:
      - fr-mirror-bridge
    volumes_from:
      - wordpress
    links:
      - db:mysql
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
    entrypoint: /bin/sh
    tty: true

  phpmyadmin:
    profiles: [dev]
    image: phpmyadmin/phpmyadmin
    networks:
      - fr-mirror-bridge
    ports:
      - "${PHP_MYADMIN_PORT}:80"  # You can change the first number (8080) to any port you prefer for accessing phpMyAdmin
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db

  mirror-ai-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile.ai
    image: fr-mirror-ai
    user: 1000:1000
    container_name: mirror-ai-dev
    restart: unless-stopped
    networks:
      - fr-mirror-bridge
    ports:
      - "${API_PORT}:80"  # FastAPI application
      - "8080:8080"  # OAuth redirect callback port
    volumes:
      - .:/code
      - ~/.ssh:/home/app/.ssh:ro
    environment:
      - DATABASE_URL
      - YOUTUBE_COOKIES_PATH
    env_file:
      - .env
      - .env.dev
    command: >
      sh -c "
        git config --global user.email ${GIT_USER_EMAIL} &&
        git config --global user.name ${GIT_USER_NAME} && 
        uvicorn app.main:app --host 0.0.0.0 --port 80 --reload
      "

  mirror-ai-prod:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile.ai
    image: fr-mirror-ai
    user: 1000:1000
    container_name: mirror-ai-prod
    restart: unless-stopped
    networks:
      - fr-mirror-bridge
    ports:
      - "${API_PORT}:80"  # FastAPI application
      - "8080:8080"  # OAuth redirect callback port
    volumes:
      - .:/code
      - ~/.ssh:/home/app/.ssh:ro
    environment:
      - DATABASE_URL
      - YOUTUBE_COOKIES_PATH
    env_file:
      - .env
      - .env.prod
    command: >
      sh -c "
        git config --global user.email ${GIT_USER_EMAIL} &&
        git config --global user.name ${GIT_USER_NAME} && 
        uvicorn app.main:app --host 0.0.0.0 --port 80 --reload
      "

volumes:
  db_data: {}
  
networks:
  fr-mirror-bridge:
    driver: bridge