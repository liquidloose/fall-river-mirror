name: Trigger pipeline

on:
  schedule:
    # Every 15 minutes (UTC)
    - cron: "*/15 * * * *"
  workflow_dispatch:  # Run manually from Actions tab

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /pipeline/run
        run: |
          code=$(curl -sSf -o /tmp/pipeline-response.json -w "%{http_code}" -X POST \
            "${{ secrets.PIPELINE_API_URL }}/pipeline/run?amount=2&auto_build=true&journalist=FRJ1&tone=professional&article_type=news&model=gpt-image-1&sync_to_wordpress=false")
          echo "HTTP $code"
          if [ "$code" -ge 400 ]; then
            cat /tmp/pipeline-response.json || true
            exit 1
          fi
