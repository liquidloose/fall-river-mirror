# Scheduled runs only trigger from the default branch (e.g. main). Enable "Allow scheduled workflows"
# under repo Settings → Actions → General if no runs appear.
#
# Nightly main pipeline: 5 new meetings (Whisper-safe). Cron is UTC — 05:30 UTC ≈ 1:30 AM EDT / 12:30 AM EST.
# Regenerate backlog runs separately on the VPS via scripts/regenerate-loop.sh (see scripts/cron-pipeline-schedule.example).
name: Trigger pipeline

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch: # Run manually from Actions tab

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: POST /pipeline/run
        run: |
          code=$(curl -sSf -o /tmp/pipeline-response.json -w "%{http_code}" -X POST \
            "${{ secrets.PIPELINE_API_URL }}/pipeline/run?amount=5&queue_mode=Use%20Whisper&auto_build=true&journalist=FRJ1&tone=professional&article_type=news&image_model=gpt-image-1&sync_to_wordpress=true")
          echo "HTTP $code"
          if [ "$code" -ge 400 ]; then
            cat /tmp/pipeline-response.json || true
            exit 1
          fi
          echo "Pipeline response:"
          jq '{success, amount, article_write: .article_write, transcript_fetch: .transcript_fetch}' /tmp/pipeline-response.json 2>/dev/null || cat /tmp/pipeline-response.json
