name: Deploy production VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
      DEPLOY_BRANCH: master
    steps:
      - name: Validate required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          VPS_POST_DEPLOY_COMMAND: ${{ secrets.VPS_POST_DEPLOY_COMMAND }}
        run: |
          [ -n "$VPS_HOST" ] || { echo "Missing required secret: VPS_HOST"; exit 1; }
          [ -n "$VPS_USER" ] || { echo "Missing required secret: VPS_USER"; exit 1; }
          [ -n "$VPS_SSH_KEY" ] || { echo "Missing required secret: VPS_SSH_KEY"; exit 1; }
          [ -n "$VPS_DEPLOY_PATH" ] || { echo "Missing required secret: VPS_DEPLOY_PATH"; exit 1; }
          [ -n "$VPS_POST_DEPLOY_COMMAND" ] || { echo "Missing required secret: VPS_POST_DEPLOY_COMMAND"; exit 1; }

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          SSH_PORT="${VPS_PORT:-22}"
          ssh-keyscan -p "$SSH_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy pushed commit on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_POST_DEPLOY_COMMAND: ${{ secrets.VPS_POST_DEPLOY_COMMAND }}
        run: |
          SSH_PORT="${VPS_PORT:-22}"
          ssh -p "$SSH_PORT" "$VPS_USER@$VPS_HOST" \
            "set -euo pipefail \
            && cd \"$DEPLOY_PATH\" \
            && git fetch origin \"$DEPLOY_BRANCH\" --prune \
            && git checkout \"$DEPLOY_BRANCH\" \
            && git reset --hard \"$GITHUB_SHA\" \
            && eval \"$VPS_POST_DEPLOY_COMMAND\""
